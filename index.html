<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolutionSync | Technical Horizon Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            --dewa-primary: #007560;
            --dewa-primary-variant: #004937;
            --dewa-active-bg: #E5F1EF;
            --dewa-text-900: #222222;
            --dewa-text-600: #6F6F6F;
            --dewa-lines: #EFEFF1;
            --dewa-border: #D7D7DF;
            --radius-card: 15px;
            --radius-pill: 100px;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F3F4F6; 
            color: var(--dewa-text-900); 
            -webkit-font-smoothing: antialiased; 
        }

        .dewa-card { 
            background: #FFFFFF; 
            border: 1px solid var(--dewa-border); 
            border-radius: var(--radius-card); 
            transition: all 0.3s ease; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }

        .btn-pill { 
            background-color: var(--dewa-primary); 
            color: white; 
            border-radius: var(--radius-pill); 
            padding: 10px 24px; 
            font-weight: 600; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px; 
            transition: background 0.3s ease; 
            width: 100%;
        }
        @media (min-width: 640px) { .btn-pill { width: auto; } }
        .btn-pill:hover { background-color: var(--dewa-primary-variant); }

        .nav-header { 
            background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--dewa-lines); 
        }

        /* DYNAMIC CLAMPING LOGIC */
        .description-container {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
        }
        .clamp-with-image { -webkit-line-clamp: 3; }
        .clamp-no-image { -webkit-line-clamp: 8; }

        .description-container.expanded {
            display: block;
            -webkit-line-clamp: unset;
        }

        .see-more-btn {
            color: var(--dewa-text-600);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
            margin-top: 4px;
        }
        .see-more-btn:hover { color: var(--dewa-primary); text-decoration: underline; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .refreshing i { animation: rotate 1s linear infinite; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="sticky top-0 z-50 nav-header px-4 py-3 sm:px-6 sm:py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-[#007560] rounded-lg p-2 shadow-sm">
                    <i class="fas fa-microchip text-white text-base"></i>
                </div>
                <div>
                    <h1 class="text-lg sm:text-xl font-bold tracking-tight text-[#222222] leading-none">SolutionSync</h1>
                    <span class="text-[9px] uppercase tracking-[0.2em] font-bold text-[#6F6F6F] hidden xs:inline">Intelligence Portal</span>
                </div>
            </div>
            
            <button onclick="fetchAllFeeds()" id="refresh-btn" class="w-10 h-10 flex items-center justify-center rounded-full border border-[#D7D7DF] bg-white hover:bg-[#EFEFF1] transition-colors">
                <i class="fas fa-sync-alt text-[#222222] text-xs"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-2 sm:px-6 mt-8 sm:mt-12 mb-20 w-full">
        <div class="mb-10 sm:mb-14 border-l-4 border-[#007560] pl-5 sm:pl-8">
            <h2 class="text-2xl sm:text-4xl font-bold text-[#222222] mb-2 tracking-tight uppercase">Technical Horizon Hub</h2>
            <p class="text-[#6F6F6F] max-w-2xl text-base sm:text-lg font-medium leading-relaxed">
                Strategic intelligence curated for advanced engineering decision-making.
            </p>
        </div>

        <div id="loader" class="flex flex-col items-center justify-center py-24">
            <div class="w-10 h-10 border-4 border-[#E5F1EF] border-t-[#007560] rounded-full animate-spin"></div>
            <p class="mt-4 text-[#6F6F6F] font-bold tracking-widest text-[10px] uppercase">Retrieving Feed...</p>
        </div>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-8 opacity-0 transition-opacity duration-700"></div>
    </main>

    <footer class="bg-white border-t border-[#D7D7DF] py-10 px-6 mt-auto text-center">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-[#6F6F6F] text-[10px] font-bold uppercase tracking-[0.2em]">
            <p>&copy; <span id="year"></span> DEWA-STYLE TECHNOLOGY HUB</p>
            <span>Verified Technical Sources</span>
        </div>
    </footer>

    <script>
        const RSS_SOURCES = [
            { name: "Wired AI", url: "https://www.wired.com/feed/tag/ai/latest/rss" },
            { name: "TechCrunch Enterprise", url: "https://techcrunch.com/category/enterprise/feed/" },
            { name: "OpenAI Blog", url: "https://openai.com/news/rss.xml" },
            { name: "AWS Technical", url: "https://aws.amazon.com/blogs/aws/feed/" },
            { name: "The Hacker News", url: "https://thehackernews.com/feeds/posts/default" }
        ];

        function getHighQualityImage(item) {
            if (item.thumbnail && item.thumbnail.includes('http')) return item.thumbnail;
            if (item.enclosure && item.enclosure.link && item.enclosure.link.match(/\.(jpg|jpeg|png|gif|webp)/)) return item.enclosure.link;
            const doc = new DOMParser().parseFromString(item.description, 'text/html');
            const img = doc.querySelector('img');
            if (img && img.src && img.src.includes('http') && !img.src.includes('feedburner')) return img.src;
            return null; 
        }

        async function fetchAllFeeds() {
            const grid = document.getElementById('news-grid');
            const loader = document.getElementById('loader');
            const refreshBtn = document.getElementById('refresh-btn');

            grid.classList.add('opacity-0');
            loader.classList.remove('hidden');
            refreshBtn.classList.add('refreshing');

            try {
                const fetchPromises = RSS_SOURCES.map(source => 
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(source.url)}&t=${Date.now()}`)
                    .then(res => res.json())
                    .then(data => data.status === 'ok' ? data.items.map(i => ({ 
                        ...i, 
                        sourceName: source.name,
                        normalizedImage: getHighQualityImage(i)
                    })) : [])
                    .catch(() => [])
                );

                const results = await Promise.all(fetchPromises);
                const combined = results.flat()
                    .filter((v, i, a) => a.findIndex(t => (t.link === v.link)) === i)
                    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

                renderGrid(combined);
                loader.classList.add('hidden');
                grid.classList.remove('opacity-0');
                grid.style.display = 'grid';
            } catch (err) {
                console.error("Sync Error", err);
            } finally {
                refreshBtn.classList.remove('refreshing');
            }
        }

        function toggleDescription(btn) {
            const container = btn.previousElementSibling;
            const isExpanded = container.classList.toggle('expanded');
            btn.innerText = isExpanded ? 'Show less' : '...see more';
        }

        function renderGrid(articles) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = articles.map(item => {
                const fullDesc = item.description.replace(/<[^>]*>?/gm, '').trim();
                const hasImage = !!item.normalizedImage;
                
                const clampClass = hasImage ? 'clamp-with-image' : 'clamp-no-image';
                const charThreshold = hasImage ? 150 : 450; 
                const isLong = fullDesc.length > charThreshold;
                
                const contentPadding = hasImage ? 'py-4' : 'py-10';
                
                const imageBlock = hasImage ? `
                    <div class="relative w-full overflow-hidden bg-gray-50 border-y border-[#EFEFF1] mt-4">
                        <img src="${item.normalizedImage}" class="w-full h-auto max-height-[260px] object-cover" style="max-height:260px" alt="media">
                    </div>
                ` : '';

                return `
                <article class="dewa-card ${contentPadding}">
                    <div class="px-5 mb-3 flex items-center gap-2 text-[11px] font-bold text-[#007560] uppercase tracking-wider">
                        <span>${item.sourceName}</span>
                        <span class="text-[#D7D7DF]">•</span>
                        <span class="text-[#6F6F6F]">${new Date(item.pubDate).toLocaleDateString('en-GB')}</span>
                    </div>

                    <div class="px-5 mb-2">
                        <h3 class="text-[15px] font-bold text-[#222222] leading-tight hover:text-[#007560] transition-colors">
                            <a href="${item.link}" target="_blank">${item.title}</a>
                        </h3>
                    </div>

                    <div class="px-5">
                        <p class="description-container ${clampClass} text-[#6F6F6F] text-[14px] leading-relaxed font-medium">
                            ${fullDesc}
                        </p>
                        ${isLong ? `<span class="see-more-btn" onclick="toggleDescription(this)">...see more</span>` : ''}
                    </div>

                    ${imageBlock}

                    <div class="px-5 mt-auto pt-4">
                        <div class="pt-4 border-t border-[#EFEFF1]">
                            <a href="${item.link}" target="_blank" class="btn-pill">
                                Read Full Article <i class="fas fa-chevron-right text-[10px]"></i>
                            </a>
                        </div>
                    </div>
                </article>
            `}).join('');
        }

        document.getElementById('year').innerText = new Date().getFullYear();
        fetchAllFeeds();
    </script>
</body>
</html>
